[pytest]
# Pytest configuration for Mission Control smoke + integration tests.
# Tests live in tests/. Run from the repo root.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers — apply via @pytest.mark.<name> or via -m on the command line
markers =
    smoke: smoke tests (fast, no side effects, run on every change)
    integration: full integration tests (slower, may have side effects)
    ssh: requires SSH to the VPS

# Output: be terse but show test names
addopts =
    --strict-markers
    --tb=short
    -ra

# 30s per-test default (override via @pytest.mark.timeout(N))
timeout = 30
