# =============================================================================
# TENANT CONFIG — EXAMPLE_TENANT.yml
# -----------------------------------------------------------------------------
# This file is consumed by `vps-setup/scripts/render-tenant.sh` which walks
# `vps-setup/agent-template/` and substitutes every `{{TENANT_*}}` token below
# with the values defined here. Output is written to
# `vps-setup/agents-config/{tenant_id}/`.
#
# Rule of thumb: if a value differs across businesses, it belongs in this file.
# If it's the same for everyone, it stays in the template.
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTITY & CONTACT
# -----------------------------------------------------------------------------
tenant_id: example-tenant                     # REQUIRED. Slug. [a-z0-9-]+. Drives Linux user, paths, systemd unit names.
person_full_name: "Jane Doe"                  # REQUIRED. Used in agent prompts, signatures.
person_first_name: "Jane"                     # REQUIRED. Used in greetings.
person_role_description: "independent fractional CMO"  # REQUIRED. One-sentence role.
contact_email: "jane@example.com"             # REQUIRED. Reply-to for drafts.
website_url: "https://example.com"            # REQUIRED. Live site reference.
timezone: "America/New_York"                   # REQUIRED. IANA tz. Drives all schedules.
locale: "en-US"                               # OPTIONAL. Default "en-US".

# Weather block on the morning brief — Open-Meteo (free, no API key).
# Look up coordinates at https://www.openstreetmap.org/ (right-click → Show address).
weather_lat:   40.7128                         # REQUIRED if morning_brief enabled. Example = NYC.
weather_lon:  -74.0060                         # REQUIRED if morning_brief enabled.
weather_label: "New York"                      # REQUIRED. City name shown in the brief.

# -----------------------------------------------------------------------------
# LINUX + FILESYSTEM
# -----------------------------------------------------------------------------
linux_user: example_tenant                    # OPTIONAL. Default: tenant_id with - to _.
user_home:  /opt/example_tenant               # COMPUTED. Default /opt/{linux_user}.
agent_home: /opt/example_tenant/agents        # COMPUTED. Default /opt/{linux_user}/agents.
website_source_path: "/opt/example_tenant/source"  # OPTIONAL. Live website source dir.
                                              # Used by ops-website-deploy.sh wrapper. Set when you have a
                                              # website at https://{dashboard_brand}.com that the agent
                                              # should be able to build + restart on its own.
website_systemd_service: ""                   # OPTIONAL. e.g. "example-web.service" — claude-agent After= directive.
                                              # ALSO used by ops-website-deploy.sh as the restart target.
vps_host: "root@1.2.3.4"                       # OPTIONAL. SSH target used by render-and-deploy.sh
                                              # (vps-setup/scripts/render-and-deploy.sh tenants/<id>.yml).
                                              # Format: user@host. If unset, pass --vps-host on the command line.

# -----------------------------------------------------------------------------
# BRAND CANON — source of truth for voice, services, narrative
# -----------------------------------------------------------------------------
brand_repo_url: "git@github.com:example/brand-canon.git"  # REQUIRED. Cloned at first render.
brand_repo_branch: "main"                                  # OPTIONAL. Default "main".
voice_playbook_path: "15_Brand_Behavior_Playbook.md"       # REQUIRED.
voice_dna_section: "section 7"                             # OPTIONAL. Pointer text for the voice DNA block.
response_playbook_path: "16_Response_Templates.md"         # REQUIRED for comms_agent.
services_doc_path: "04_Services_and_Offers.md"             # REQUIRED for pipeline_agent.
content_strategy_path: "08_Content_Strategy.md"            # REQUIRED for content_agent.
narrative_core_path: "02_Narrative_Core.md"                # REQUIRED.
email_templates_path: "17_Email_Templates.md"              # OPTIONAL.
rss_sources_path: "20_RSS_Sources.md"                      # OPTIONAL.
agent_skills_dir: "agent-skills"                           # OPTIONAL. Default "agent-skills".
entity_separation_terms:                                   # REQUIRED (may be empty list).
  - "OtherCo LLC"
  - "SisterBrand"

# -----------------------------------------------------------------------------
# VOICE RULES
# -----------------------------------------------------------------------------
voice_archetype_primary: "Sage"               # REQUIRED.
voice_archetype_secondary: "Creator"          # OPTIONAL.
voice_descriptors:                            # REQUIRED. Free-form adjectives.
  - "direct"
  - "empathetic"
  - "clarity over cleverness"
voice_banned_phrases:                         # OPTIONAL. Default [].
  - "thrilled to"
  - "excited to share"
  - "in today's fast-paced world"
voice_emoji_policy: "no emojis unless user uses them first"  # REQUIRED.

# -----------------------------------------------------------------------------
# GOHIGHLEVEL — secrets referenced via env-var name only
# -----------------------------------------------------------------------------
ghl_enabled: true                             # REQUIRED.
ghl_location_id_env: "GHL_LOCATION_ID"        # REQUIRED if ghl_enabled.
ghl_pit_env: "GHL_API_KEY"                    # REQUIRED if ghl_enabled.
ghl_base_url: "https://services.leadconnectorhq.com"  # OPTIONAL.

# -----------------------------------------------------------------------------
# DISCORD (v0.5+ optional second surface — see vps-setup/RUNBOOKS/discord-setup.md)
# -----------------------------------------------------------------------------
discord_enabled: false                        # OPTIONAL. Set true after running discord-setup.md
# Set the following ONLY if discord_enabled: true. Bootstrap writes these to
# {{TENANT_AGENT_HOME}}/.env from these values.
discord_bot_token_env: "DISCORD_BOT_TOKEN"    # Name of env var (the token itself stays in .env, never in YAML)
discord_guild_id: ""                          # Server ID. Right-click server → Copy Server ID
discord_owner_user_id: ""                     # Your Discord user ID for the #commands allowlist
# Channel IDs — fill after creating channels per the runbook
discord_channels:                             # OPTIONAL. Leave empty if discord_enabled: false
  facts: ""
  decisions: ""
  relationships: ""
  patterns: ""
  commitments: ""
  preferences: ""
  goals: ""
  context: ""
  agent_log: ""
  task_events: ""
  intel: ""
  commands: ""
  daily_brief: ""
  ghl_activity: ""
  gmail_alerts: ""

# -----------------------------------------------------------------------------
# TELEGRAM
# -----------------------------------------------------------------------------
telegram_enabled: true                        # REQUIRED.
telegram_bot_username: "Example_AgentBot"     # REQUIRED if telegram_enabled.
telegram_chat_id_env: "TELEGRAM_CHAT_ID"      # REQUIRED if telegram_enabled. Allowlist.
slash_commands:                               # OPTIONAL. Default = the standard 12 (see template).
  - { command: "brief",     description: "Run morning brief now" }
  - { command: "tasks",     description: "Show open task ledger" }
  - { command: "done",      description: "Mark task done — usage: /done t-XXXX" }
  - { command: "cancel",    description: "Cancel task — usage: /cancel t-XXXX" }
  - { command: "extend",    description: "Push deadline — usage: /extend t-XXXX 2026-05-15" }
  - { command: "pipeline",  description: "Pipeline state and stalled deals" }
  - { command: "drafts",    description: "Pending drafts awaiting review" }
  - { command: "inbox",     description: "High-priority inbound" }
  - { command: "research",  description: "Research a person or company" }
  - { command: "draft",     description: "Quick draft — /draft [linkedin|email|sms] [topic]" }
  - { command: "scan",      description: "Brand drift scan" }
  - { command: "calendar",  description: "Today and tomorrow" }

# -----------------------------------------------------------------------------
# SCHEDULE — all in tenant timezone
# -----------------------------------------------------------------------------
daily_spend_ceiling_usd: 20
# Monthly cost of the VPS this agent runs on (USD). Surfaced on the dashboard
# System page. Estimate is fine — there's no billing API. 0 = "not set".
vps_monthly_cost_usd: 0
# Optional: a client codebase to fold into the unified Graphify knowledge graph
# for cross-repo /graph + /who traversal. Empty = none. When set, bootstrap
# clones + graphs + merges it on a fresh deploy.
client_repo_url: ""
morning_brief_time: "09:00:00"                # REQUIRED.
evening_rollup_time: "18:00:00"               # REQUIRED.
stale_watcher_hours: "9..21"                  # OPTIONAL. systemd OnCalendar hour-range.
stale_threshold_hours: 48                     # OPTIONAL. Default 48.

# -----------------------------------------------------------------------------
# SUB-AGENT PERSONAS — appended to each sub-agent's base prompt
# -----------------------------------------------------------------------------
comms_agent_role: "drafts client emails and DM replies for an independent fractional CMO."
pipeline_agent_role: "summarizes GHL opportunities and flags stalled deals."
content_agent_role: "drafts LinkedIn + newsletter content grounded in narrative_core."
research_agent_role: "scans RSS + web for prospects and competitive moves."
drift_scanner_role: "checks the live website + recent drafts for off-brand language and banned entities."

# -----------------------------------------------------------------------------
# OUT-OF-BOUNDS — paths the agent must never touch
# -----------------------------------------------------------------------------
protected_paths:                              # REQUIRED.
  - "/opt/example_tenant/source/"
  - "/etc/"
  - "/var/www/"

# -----------------------------------------------------------------------------
# MISSION CONTROL DASHBOARD (v2.20.0+)
# -----------------------------------------------------------------------------
# Hostname for the per-tenant dashboard (ella.<brand>.com or similar).
dashboard_hostname: "ella.example.com"             # REQUIRED if dashboard enabled.
dashboard_title:    "Example — Mission Control"    # REQUIRED if dashboard enabled.

# TLS cert + key paths AS THEY EXIST ON THE TARGET VPS (not as you wish they did).
# Most tenants reuse a single wildcard *.<brand>.com Cloudflare Origin Certificate
# rather than provisioning per-subdomain certs — point at whichever paths nginx
# can actually read. Pre-flight should `test -f` both before staging.
# Example for a wildcard origin cert installed under /etc/ssl/{certs,private}/:
tls_cert_path: "/etc/ssl/certs/example.com-origin.crt"        # REQUIRED if dashboard enabled.
tls_key_path:  "/etc/ssl/private/example.com-origin.key"      # REQUIRED if dashboard enabled.

# -----------------------------------------------------------------------------
# FEATURE TOGGLES
# -----------------------------------------------------------------------------
features:
  morning_brief: true
  evening_rollup: true
  stale_watcher: true
  task_ledger: true
  markdownv2_default: true
  gh_repo_commits: true
  # v0.3+ proactive notification pipeline (see vps-setup/agent-template/systemd/)
  task_deadline_watcher:    true   # hourly nudges on tasks crossing 24h / 4h / due / overdue
  goal_deadline_watcher:    true   # daily 09:30 — 7d/1d/overdue + behind-pace check
  stalled_deal_watcher:     true   # daily 10:00 — GHL opps ≥$2K idle ≥7d
  disk_space_watcher:       true   # every 4h around clock — 75/85/95% thresholds
  hot_lead_inbox_watcher:   true   # 4×/day — Gmail MCP + GHL cross-ref via claude --print
  calendar_conflict_watcher: true  # 3×/day 07/12/17 — overlapping events on primary calendar
  graphify_rebuild:         true   # weekly Sunday 03:00 — AST-only project graph refresh
  # v0.3+ agent self-service ops (5 wrappers under {{TENANT_AGENT_HOME}}/scripts/ops/)
  agent_self_service_ops:   true   # adds sudoers entry for {{TENANT_LINUX_USER}}
  # v0.3+ voice round-trip (whisper.cpp transcribe + edge-tts reply)
  voice_round_trip:         true   # auto-detect EN/ES, configurable voice mode via /voice
  # v0.5+ memory layer v2 (SQLite + FTS + vector embeddings + supersession)
  memory_vault_v2:          true   # 8 memory types, embedding-service.py daemon, semantic recall
  memory_auto_extract:      true   # extracts memories from claude session jsonl files (hourly timer)
  memory_consolidate:       true   # nightly consolidation of duplicate/stale memories
  obsidian_vault_mirror:    true   # memory-export.py renders SQLite → obsidian-vault/memories/*.md every 5 min
  entity_linker:            true   # nightly auto-promote names appearing 3+ times to relationship records
  commitment_tracking:      true   # commitment-log.sh + commitment-deadline-watcher.sh (separate from tasks)
  signal_edit_tracking:     true   # voice DNA feedback loop — log the tenant's edits to drafts
  save_recommendation:      true   # capture strategic plans as type=recommendation memories
  context_system:           true   # active.md + context-inject + session-summary for wake-up state
  # v0.5+ Discord command center (optional second surface)
  discord_enabled:          false  # see vps-setup/RUNBOOKS/discord-setup.md to enable
  # v0.5+ Obsidian sync to Mac (optional)
  syncthing_enabled:        false  # see vps-setup/RUNBOOKS/syncthing-setup.md to enable
  # v0.5+ alternative knowledge graphs (optional, advanced)
  graphiti_temporal_graph:  false  # FalkorDB + Graphiti MCP for temporal knowledge graphs (needs Docker)
  multi_agent_swarms:       false  # bizdev/content/delivery/onboarding swarms via swarm-router.sh

  # v0.7.0 Mission Control — full observability stack. All default ON; they
  # don't cost anything to leave running and unlock the dashboard tabs +
  # Telegram /budget /roi /activity commands. Disable individually if a
  # client doesn't want a particular surface (rare).
  mission_control_v0_7:           true   # Master flag — disables ALL of the below
  enable_rules_engine:            true   # v2.48 behavioral rules (YAML DSL)
  enable_anomaly_detection:       true   # v2.49 z-score + EWMA on telemetry
  enable_session_parser:          true   # v2.54 ingests Claude Code session JSONLs into spans.db
  enable_circuit_breakers:        true   # v2.57 hard cost-ceiling guardrails
  enable_watchers:                true   # proactive watchers (disk/deadline/stalled-deal/etc.)
  enable_observability_dashboard: true   # 17-tab dashboard (audit/rules/deploys/activity/roi)

# -----------------------------------------------------------------------------
# v0.7.0 Mission Control configuration
# -----------------------------------------------------------------------------
# ROI math (used by _roi.py + /api/roi.json + ROI dashboard tab).
# Defaults reflect industry-typical solo-consultant rates. Override per
# tenant if their billable rates differ materially.
roi_hourly_rates:
  strategy:         200.0  # most expensive — strategy/positioning work
  research:         150.0
  newsletter:       150.0
  competitive_scan: 150.0
  self_improvement: 150.0
  draft:             75.0  # content drafting baseline
  morning_brief:     75.0
  evening_rollup:    75.0
  summary:           75.0
  pipeline_report:  100.0
  drift_scan:       100.0
  review:           100.0
  outreach:          90.0
  social_draft:      90.0
  data_pull:         90.0
  dashboard_chat:    90.0
  telegram_chat:     90.0
  scheduling:        50.0  # admin/triage baseline
  memory:            50.0
  default:           75.0  # fallback for unknown task types

# Default realization rate when a task type isn't explicitly configured.
# 0.5 = output needs heavy review; 0.7 = light review (default); 0.9 = ships as-is.
# Per-type overrides live in _roi.py:ROI_CONFIG.
roi_default_realization_rate: 0.7

# Cost-ceiling thresholds (used by rules/budget-ceilings.yaml).
# Trips a global circuit breaker → autonomous skills refuse to run until
# the operator manually clears it via DELETE /api/chat/budget.
cost_ceiling_daily_usd:   5.0   # daily API spend trigger
cost_ceiling_block_hours: 12    # how long the breaker stays engaged

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------
created_at: "2026-04-30"
version: "1.0.0"
owner: "owner@example.com"

# =============================================================================
# VALIDATION RULES
# -----------------------------------------------------------------------------
# REQUIRED: tenant_id, person_full_name, person_first_name, person_role_description,
#   contact_email, website_url, timezone, brand_repo_url, voice_playbook_path,
#   response_playbook_path, services_doc_path, content_strategy_path,
#   narrative_core_path, entity_separation_terms, voice_archetype_primary,
#   voice_descriptors, voice_emoji_policy, ghl_enabled,
#   (if ghl_enabled: ghl_location_id_env, ghl_pit_env), telegram_enabled,
#   (if telegram_enabled: telegram_bot_username, telegram_chat_id_env),
#   morning_brief_time, evening_rollup_time, comms_agent_role, pipeline_agent_role,
#   content_agent_role, research_agent_role, drift_scanner_role, protected_paths,
#   created_at, version, owner
#
# CROSS-FIELD CHECKS:
#   - tenant_id ~ ^[a-z][a-z0-9-]{1,30}$
#   - linux_user ~ ^[a-z_][a-z0-9_-]{0,31}$
#   - timezone is valid IANA
#   - all *_path values must exist inside cloned brand_repo
#   - protected_paths must be absolute
#   - if features.gh_repo_commits, brand_repo_url must be SSH (git@…)
#   - tls_cert_path + tls_key_path must `test -f` on the target VPS BEFORE
#     staging the rendered nginx vhost (don't trust the YAML — verify on host)
# =============================================================================
