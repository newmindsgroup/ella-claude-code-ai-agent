name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Same-repo, non-draft PRs only. Fork PRs have no secret access; drafts aren't ready.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check for Claude credentials
        id: key
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$OAUTH" ] || [ -n "$APIKEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Claude review skipped::No Claude credential configured. Add CLAUDE_CODE_OAUTH_TOKEN (Pro/Max: run 'claude setup-token') or ANTHROPIC_API_KEY as a repo secret to enable automatic reviews."
          fi

      - name: Checkout
        if: steps.key.outputs.present == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude four-pillar review
        if: steps.key.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request against the four non-negotiable pillars, in
            priority order, then general correctness:

            1. SECURITY - hardcoded secrets or tokens, missing input validation,
               injection risks, broken auth/authz, unsafe dependency changes, OWASP Top 10.
            2. STABILITY - missing error handling on external calls, silent failures,
               untested core paths, breaking changes to existing behavior.
            3. RELIABILITY - non-idempotent operations, missing rollback/backup paths
               for stateful changes, ungraceful degradation.
            4. COMPLIANCE - PII/privacy handling (GDPR/CCPA), accessibility (WCAG) for
               user-facing UI, license issues in new dependencies or assets.

            Be direct and concise. Separate findings into BLOCKERS (must fix) and
            SUGGESTIONS (nice to have). Skip style nitpicks a formatter would catch.
            If the PR is clean, say so in one short comment - do not invent issues.

            The PR branch is already checked out in the current working directory.
            Use `gh pr comment` for the summary verdict.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`)
            for specific code issues.
            Only post GitHub comments - don't submit review text as messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
